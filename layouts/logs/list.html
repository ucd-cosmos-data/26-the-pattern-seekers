{{- define "main" }}
<section class="page-shell" aria-labelledby="logs-title">
    <header class="page-header">
        {{- partial "breadcrumbs.html" . }}
        <h1 id="logs-title" data-reveal data-reveal-delay="90">Logs</h1>
    </header>
    {{- with .Content }}
    <div class="log-content">{{ . }}</div>
    {{- end }}
</section>
{{- end }}
