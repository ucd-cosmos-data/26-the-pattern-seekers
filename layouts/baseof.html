<!doctype html>
<html lang="{{ .Site.Language.Locale }}" dir="{{ default `ltr` .Language.Direction }}">
    <head>
        <script>
            (function () {
                var saved = "auto";
                try {
                    saved = localStorage.getItem("StackColorScheme") || "auto";
                } catch (error) {
                    saved = "auto";
                }
                var systemDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
                document.documentElement.dataset.scheme =
                    saved === "dark" || (saved === "auto" && systemDark) ? "dark" : "light";
            })();
        </script>
        <style>
            html[data-scheme="dark"],
            html[data-scheme="dark"] body {
                background: #000;
                color-scheme: dark;
            }
            html[data-scheme="light"],
            html[data-scheme="light"] body {
                background: #f5f5f7;
                color-scheme: light;
            }
        </style>
        {{- partial "head/head.html" . -}} {{- block "head" . -}}{{ end }}
    </head>
    <body class="{{ block `body-class` . }}{{ end }}">
        {{- partial "head/colorScheme" . -}} {{- block "left-sidebar" . -}} {{ partial
        "sidebar/left.html" . }} {{- end }}
        <div class="container main-container flex on-phone--column compact">
            {{- block "right-sidebar" . -}}{{ end }}
            <main class="main full-width">{{- block "main" . }}{{- end }}</main>
        </div>
        {{ partial "footer/include.html" . }}
    </body>
</html>
