{{- define "main" }}
<header class="page-header">
  {{- partial "breadcrumbs.html" . }}
  <h1>{{ .Title }}</h1>
  {{- if .Description }}
  <div class="post-description">{{ .Description | markdownify }}</div>
  {{- end }}
</header>
{{- if .Content }}
<div class="post-content md-content main-article">{{ .Content }}</div>
{{- end }}
{{- end }}{{- /* end main */ -}}
