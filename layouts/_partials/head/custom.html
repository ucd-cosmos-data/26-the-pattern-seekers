{{- if or .Params.math .Site.Params.article.math -}}
{{- partialCached "article/components/math.html" . -}}
{{- end -}}

<link rel="preload" href="{{ "fonts/Satoshi-Variable.woff2" | relURL }}" as="font" type="font/woff2" crossorigin>
<link rel="stylesheet" href="{{ "css/tailwind.css" | relURL }}">
{{- $socialImage := "og.png" | absURL -}}
<meta property="og:image" content="{{ $socialImage }}">
<meta property="og:image:alt" content="The Pattern Seekers over a two-source water interference pattern">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:image" content="{{ $socialImage }}">
<script>document.documentElement.classList.add("js");</script>
{{- $siteScript := resources.Get "js/site.js" | minify | fingerprint -}}
<script src="{{ $siteScript.RelPermalink }}" integrity="{{ $siteScript.Data.Integrity }}" defer></script>
