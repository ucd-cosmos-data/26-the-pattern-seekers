{{- define "main" }}
<section class="page-shell project-index" aria-labelledby="project-index-title">
    <header class="page-header">
        {{- partial "breadcrumbs.html" . }}
        <h1 id="project-index-title" data-reveal data-reveal-delay="90">Projects</h1>
    </header>

    <div
        class="project-grid tw:grid"
        data-reveal-stagger
        data-reveal-start="210"
        data-reveal-step="90"
    >
        {{- range .RegularPages.ByDate.Reverse }}
        <article class="project-card" data-reveal>
            <a class="project-card__link" href="{{ .RelPermalink }}">
                <div class="project-card__thumbnail">
                    <img
                        src="{{ .Params.thumbnail | relURL }}"
                        alt="{{ .Params.thumbnailAlt }}"
                        loading="lazy"
                    />
                </div>
                <div class="project-card__content">
                    <h2>{{ .Title }}</h2>
                    <p>{{ .Description }}</p>
                    <span class="project-card__action" aria-hidden="true"
                        >Read <span>→</span></span
                    >
                </div>
            </a>
        </article>
        {{- end }}
    </div>
</section>
{{- end }}
