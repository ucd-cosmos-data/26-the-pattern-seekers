baseURL: https://ucd-cosmos-data.github.io/26-the-pattern-seekers/
locale: en-us
title: "The Pattern Seekers"
theme: hugo-theme-stack

params:
  favicon: bonsai.jpeg #the small icon shown in the browser tab
  colorScheme:
    toggle: false
    default: auto
  article:
    math: true
    headingAnchor: true
  socialIcons:
    - name: github
      url: "https://github.com/ucd-cosmos-data/26-the-pattern-seekers"
    - name: github
      url: "https://github.com/ucd-cosmos-data/26-the-pattern-seekers-analysis"
  profileMode:
    title: "The Pattern Seekers"
    subtitle: "A data studio for curious patterns, public health questions, and visual stories."
    imageUrl: "/26-the-pattern-seekers/cosmos.png"
    imageWidth: 420
    imageHeight: 334

menu:
  main:
    - identifier: Members
      name: Members
      url: /members/
      weight: 10
    - identifier: Projects
      name: Projects
      url: /projects/
      weight: 20
    - identifier: Logs
      name: Logs
      url: /logs/
      weight: 30
    - identifier: Photos
      name: Photos
      url: /photos/
      weight: 40
    - identifier: course-site
      name: Course Website
      url: https://ucd-cosmos-data.github.io/

markup:
  goldmark:
    renderer:
      unsafe: true
    extensions:
      passthrough:
        delimiters:
          block:
          - - $$
            - $$
        enable: true
